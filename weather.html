<!doctype html>
<html lang="en">
    <head>
        <link rel="icon" href="/favicon.png" />
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <meta name="description" content="Weather forecast" />
        <meta name="author" content="" />

        <title>Weather — James Atkin</title>

        <!-- Font Awesome 6 (local) -->
        <link
            href="vendor/fontawesome-free/fontawesome-free/css/all.min.css"
            rel="stylesheet"
        />

        <!-- Theme CSS - Includes Bootstrap -->
        <link href="css/creative.css" rel="stylesheet" />
    </head>

    <body id="page-top">
        <!-- Navbar/header -->
        <div class="header" id="header" role="banner">
            <a href="/" class="header-link">
                <span>James Atkin</span>
            </a>
            <button
                class="nav-hamburger"
                id="navHamburger"
                aria-label="Open navigation menu"
                aria-expanded="false"
                aria-controls="rightHandNav"
            >
                <i class="fas fa-angle-down" aria-hidden="true"></i>
            </button>
            <div class="right-hand-nav" id="rightHandNav" role="navigation">
                <a
                    href="/#portfolio"
                    class="header-link writing-link"
                    rel="noopener noreferrer"
                >
                    <div class="title">Projects</div>
                </a>
                <div class="nav-divider"></div>
                <a
                    href="/writing"
                    class="header-link writing-link"
                    rel="noopener noreferrer"
                >
                    <div class="title">Writing</div>
                </a>
            </div>
        </div>

        <div class="main" role="main">
            <div class="weather-container">
                <!-- ── Location search ──────────────────────────────────── -->
                <form
                    class="weather-search"
                    id="weatherSearch"
                    role="search"
                    aria-label="Search for a location"
                >
                    <input
                        class="weather-search-input"
                        type="search"
                        id="weatherSearchInput"
                        placeholder="Search location…"
                        autocomplete="off"
                        aria-label="Location"
                    />
                    <button
                        class="weather-search-btn"
                        type="submit"
                        aria-label="Search"
                    >
                        <i class="fas fa-search" aria-hidden="true"></i>
                    </button>
                    <button
                        class="weather-search-btn"
                        type="button"
                        id="weatherGeoBtn"
                        aria-label="Use my location"
                    >
                        <i class="fas fa-location-arrow" aria-hidden="true"></i>
                    </button>
                    <!-- Suggestions drop-down lives inside the form for correct relative positioning -->
                    <ul
                        class="weather-suggestions"
                        id="weatherSuggestions"
                        role="listbox"
                        aria-label="Location suggestions"
                        hidden
                    ></ul>
                </form>

                <!-- ── Status message (loading / error) ─────────────────── -->
                <p
                    class="weather-status"
                    id="weatherStatus"
                    aria-live="polite"
                ></p>

                <!-- ── Location & date ───────────────────────────────────── -->
                <div id="weatherHeading" hidden>
                    <h1 id="weatherLocationName"></h1>
                    <p class="weather-date" id="weatherDateLine"></p>
                </div>

                <!-- ── Current conditions ────────────────────────────────── -->
                <div
                    class="weather-current"
                    id="weatherCurrent"
                    aria-label="Current conditions"
                    hidden
                >
                    <span
                        class="weather-current-icon"
                        id="weatherCurrentIcon"
                        aria-hidden="true"
                    ></span>
                    <span
                        class="weather-current-temp"
                        id="weatherCurrentTemp"
                    ></span>
                    <span
                        class="weather-current-desc"
                        id="weatherCurrentDesc"
                    ></span>
                    <div
                        class="weather-current-details"
                        id="weatherCurrentDetails"
                    ></div>
                </div>

                <!-- ── Today — hour by hour ──────────────────────────────── -->
                <section class="weather-section" id="hourlySection" hidden>
                    <h2 class="weather-section-title">Today</h2>
                    <div
                        class="hourly-strip"
                        id="hourlyStrip"
                        role="list"
                        aria-label="Hourly forecast"
                    ></div>
                </section>

                <!-- ── This week — day by day ────────────────────────────── -->
                <section class="weather-section" id="weeklySection" hidden>
                    <h2 class="weather-section-title">This week</h2>
                    <div
                        class="day-grid"
                        id="dayGrid"
                        role="list"
                        aria-label="7-day forecast"
                    ></div>
                </section>
            </div>
        </div>

        <!-- Footer -->
        <footer class="py-5" id="footer">
            <div class="container">
                <div class="small text-center" id="footer-text"
                    >&copy; JAMES ATKIN <span id="year"></span
                ></div>
            </div>
        </footer>

        <!-- Bootstrap core JavaScript -->
        <script src="vendor/jquery/jquery.min.js"></script>
        <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

        <script src="insertCurrentYear.js"></script>
        <script src="js/weather.js"></script>
    </body>
</html>
