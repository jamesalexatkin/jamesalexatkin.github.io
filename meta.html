<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel=icon href=/favicon.png>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <meta name="description" content="" />
        <meta name="author" content="" />

        <title>James Atkin</title>

        <!-- Font Awesome Icons -->
        <script src="https://use.fontawesome.com/134696755a.js"></script>

        <!-- Plugin CSS -->
        <link
            href="vendor/magnific-popup/magnific-popup.css"
            rel="stylesheet"
        />

        <!-- Theme CSS - Includes Bootstrap -->
        <link href="css/creative.css" rel="stylesheet" />
    </head>

    <body id="page-top">
        <!-- Navbar/header -->
        <div class="header" id="header" role="banner">
            <a href="#" class="header__logo">
                <span>James Atkin</span>
            </a>
            <button class="header__hamburger" id="navHamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="rightHandNav">
                <i class="fa fa-angle-down" aria-hidden="true"></i>
            </button>
            <div class="header__nav" id="rightHandNav" role="navigation">
                <a
                    href="#portfolio"
                    class="header__link header__link--writing"
                    rel="noopener noreferrer"
                >
                    <div class="title">Projects</div>
                </a>
                <div class="header__divider"></div>
                <a
                    href="/writing"
                    class="header__link header__link--writing"
                    rel="noopener noreferrer"
                >
                    <div class="title">Writing</div>
                </a>
                <!-- <div class="nav-divider"></div>
                <a
                    href="#photography"
                    class="header-link writing-link"
                    rel="noopener noreferrer"
                >
                    <div class="title">Photography</div>
                </a> -->
            </div>
        </div>
        <div class="main" role="main">
            <!-- Meta  Section -->
            <div class="projects" id="portfolio">
                <h1 class="title">Meta </h1>
                <ul class="writing-list">
                    <li class="writing-list__item">
                        <a class="writing-list__link" href="https://github.com/jamesalexatkin/jamesalexatkin.github.io" rel="noopener noreferrer" target ="_blank">
                            <span class="writing-list__title">Source</span>
                            <div class="writing-list__subtitle">View on GitHub ➡️</div>  
                        </a>
                    </li>
                    <li class="writing-list__item">
                        <a class="writing-list__link" href="/vellum" rel="noopener noreferrer">
                            <span class="writing-list__title">Vellum</span>
                            <div class="writing-list__subtitle">Minimal design system.</div>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Footer -->
        <footer class="py-5" id="footer">
            <div class="container">
                <div class="small text-center" id="footer-text"
                    >
                <a href="/meta" rel="noopener noreferrer">Meta</a> | &copy; JAMES ATKIN <span id="year"></span
                ></div>
            </div>
        </footer>

        <!-- Bootstrap core JavaScript -->
        <script src="vendor/jquery/jquery.min.js"></script>
        <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

        <!-- Plugin JavaScript -->
        <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
        <script src="vendor/magnific-popup/jquery.magnific-popup.min.js"></script>

        <!-- Custom scripts for this template -->
        <script src="js/creative.min.js"></script>

        <script src="insertCurrentYear.js"></script>
        <script>
            (function () {
                var btn = document.getElementById('navHamburger');
                var nav = document.getElementById('rightHandNav');
                btn.addEventListener('click', function () {
                    var open = nav.classList.toggle('is-open');
                    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
                    btn.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
                });
                // Close menu when a nav link is clicked
                nav.querySelectorAll('a').forEach(function (link) {
                    link.addEventListener('click', function () {
                        nav.classList.remove('is-open');
                        btn.setAttribute('aria-expanded', 'false');
                        btn.setAttribute('aria-label', 'Open navigation menu');
                    });
                });
            })();
        </script>
    </body>
</html>
